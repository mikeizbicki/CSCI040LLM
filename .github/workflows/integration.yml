name: Integration Test

on: [push]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install package from GitHub
        run: pip install .

      - name: Test chat command with heredoc
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat <<'EOF'
          I am bob.
          What is my name?
          EOF

      - name: Test CLI argument
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat 'say hello in exactly 1 word'

      - name: Test debug flag
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          output=$(chat --debug 'please use the ls tool to list files in the current directory')
          echo "$output"
          echo "$output" | grep -q '\[tool\]'
