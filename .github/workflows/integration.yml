name: Integration Test

on: [push]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Install package from PyPI
        run: pip install cmc-csci005-nicolaslaub

      - name: Test chat command with heredoc
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat <<'EOF'
          I am bob.
          What is my name?
          EOF
